{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Set New Password | Wagwan Family</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input { width: 100%; background-color: #171717; border: 1px solid #262626; color: white; padding: 0.75rem 1rem; font-size: 0.875rem; outline: none; transition: border-color 0.2s; margin-bottom: 1rem;}
        input:focus { border-color: #FF4500; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
        .helptext, ul.errorlist { font-size: 0.7rem; color: #6b7280; display: block; }

        /* Relative wrapper for the show password button */
        .password-wrapper { position: relative; }
        .toggle-password-btn {
            position: absolute;
            right: 1rem;
            top: 35%; /* slightly adjusted for the helper text beneath */
            transform: translateY(-50%);
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #6b7280;
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
        }
        .toggle-password-btn:hover { color: #FF4500; }
    </style>
</head>
<body class="bg-black text-white h-screen flex items-center justify-center relative overflow-hidden">
    <div class="w-full max-w-md p-8 md:p-10 bg-neutral-950/90 border border-neutral-900 relative z-10 shadow-2xl text-center">
        <h1 class="text-xl font-black uppercase tracking-widest text-white mb-6">Set New <span class="text-[#FF4500]">Password</span></h1>
        
        {% if validlink %}
            <form method="POST" class="text-left">
                {% csrf_token %}
                {{ form }}
                <button type="submit" class="w-full mt-6 bg-[#FF4500] hover:bg-[#CC3700] text-white font-bold py-4 text-xs uppercase tracking-widest transition">
                    Secure Account
                </button>
            </form>
        {% else %}
            <p class="text-red-500 text-sm font-bold uppercase tracking-widest mb-6">The password reset link was invalid, possibly because it has already been used.</p>
            <a href="{% url 'reset_password' %}" class="text-xs text-[#FF4500] uppercase tracking-widest font-bold hover:text-white transition">Request a new link</a>
        {% endif %}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const passwordInputs = document.querySelectorAll('input[type="password"]');
            passwordInputs.forEach(input => {
                const wrapper = document.createElement('div');
                wrapper.className = 'password-wrapper';
                input.parentNode.insertBefore(wrapper, input);
                wrapper.appendChild(input);

                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'toggle-password-btn';
                btn.innerText = 'SHOW';
                
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (input.type === 'password') {
                        input.type = 'text';
                        btn.innerText = 'HIDE';
                    } else {
                        input.type = 'password';
                        btn.innerText = 'SHOW';
                    }
                });
                wrapper.appendChild(btn);
            });
        });
    </script>
</body>
</html>
