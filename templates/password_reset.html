{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Reset Protocol | Wagwan Family</title>
    <link rel="icon" type="image/png" href="{% static 'images/favlogo.jpeg' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input { width: 100%; background-color: #171717; border: 1px solid #262626; color: white; padding: 0.75rem 1rem; font-size: 0.875rem; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #FF4500; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    </style>
</head>
<body class="bg-black text-white h-screen flex items-center justify-center relative overflow-hidden selection:bg-[#FF4500] selection:text-white">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-[#FF4500] rounded-full mix-blend-multiply filter blur-[180px] opacity-10 pointer-events-none"></div>

    <div class="w-full max-w-md p-8 md:p-10 bg-neutral-950/90 backdrop-blur-md border border-neutral-900 relative z-10 shadow-2xl text-center">
        <h1 class="text-xl font-black uppercase tracking-widest text-white mb-2">Lost <span class="text-[#FF4500]">Access?</span></h1>
        <p class="text-xs text-gray-500 uppercase tracking-widest font-bold mb-8">Enter your email to receive recovery protocols.</p>

        <form method="POST" class="space-y-6 text-left">
            {% csrf_token %}
            {{ form }}
            <button type="submit" class="w-full mt-4 bg-[#FF4500] hover:bg-[#CC3700] text-white font-bold py-4 text-xs uppercase tracking-widest transition shadow-[0_0_15px_rgba(255,69,0,0.2)]">
                Send Recovery Link
            </button>
        </form>
        
        <div class="mt-8 border-t border-neutral-900 pt-6">
            <a href="{% url 'login' %}" class="text-xs text-gray-500 uppercase tracking-widest font-bold hover:text-white transition">Cancel & Return to Login</a>
        </div>
    </div>
</body>
</html>
