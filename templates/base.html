{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">
    <title>Wagwan Family | Build Your Destiny</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-black text-white antialiased selection:bg-[#FF4500] selection:text-white">
 <nav class="absolute top-0 left-0 w-full z-50 px-6 py-6 md:px-12 flex items-center justify-between text-white bg-black/80 md:bg-transparent backdrop-blur-md md:backdrop-blur-none">
    
    <div class="w-auto md:w-1/3 flex justify-start">
        <a href="{% url 'home' %}">
            <h1 class="text-xl md:text-2xl font-black tracking-widest uppercase flex flex-col md:flex-row md:items-baseline gap-1 md:gap-2">
                <span>Wagwan<span class="text-[#FF4500]">Family</span></span>
                <span class="text-[0.65rem] md:text-xs font-semibold text-gray-400 tracking-widest">EST. 2024</span>
            </h1>
        </a>
    </div>

    <div class="w-1/3 hidden lg:flex justify-center items-center gap-8 text-sm font-bold uppercase tracking-widest">
        <a href="{% url 'content_catalog' %}" class="uppercase font-bold tracking-widest hover:text-[#FF4500] transition-colors">Content</a>
        <a href="{% url 'leaderboard' %}" class="hover:text-[#FF4500] transition-colors duration-300">Community</a>
        <a href="{% url 'tools' %}" class="hover:text-[#FF4500] transition-colors duration-300">Tools</a>
    </div>

    <div class="w-auto md:w-1/3 flex justify-end items-center gap-4">
        <div class="hidden md:block">
            {% if not user.is_authenticated %}
                <a href="{% url 'my_arsenal' %}" class="px-6 py-2 border border-white text-white hover:bg-white hover:text-black transition-colors font-bold text-xs uppercase tracking-widest">Access Arsenal</a>
            {% else %}
                <a href="{% url 'my_arsenal' %}" class="px-6 py-2 border border-[#FF4500] text-[#FF4500] hover:bg-[#FF4500] hover:text-white transition-colors font-bold text-xs uppercase tracking-widest">My Arsenal</a>
            {% endif %} 
        </div>
        
        <button id="mobile-nav-toggle" class="lg:hidden text-white focus:outline-none">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </div>
</nav>

<div id="mobile-menu-overlay" class="fixed inset-0 bg-black z-[100] hidden flex-col items-center justify-center space-y-8">
    <button id="close-mobile-nav" class="absolute top-8 right-6 text-white focus:outline-none hover:text-[#FF4500] transition-colors">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
    <a href="{% url 'content_catalog' %}" class="text-2xl font-black uppercase tracking-widest hover:text-[#FF4500] transition-colors">Content</a>
    <a href="{% url 'leaderboard' %}" class="text-2xl font-black uppercase tracking-widest hover:text-[#FF4500] transition-colors">Community</a>
    <a href="{% url 'tools' %}" class="text-2xl font-black uppercase tracking-widest hover:text-[#FF4500] transition-colors">Tools</a>
    
    <div class="pt-8 border-t border-neutral-800 w-2/3 flex flex-col items-center gap-6">
        {% if user.is_authenticated %}
            <a href="{% url 'my_arsenal' %}" class="text-xl font-black uppercase tracking-widest text-[#FF4500]">My Arsenal</a>
        {% else %}
            <a href="{% url 'login' %}" class="text-xl font-black uppercase tracking-widest text-gray-400 hover:text-white">Log In</a>
            <a href="{% url 'register' %}" class="text-xl font-black uppercase tracking-widest text-[#FF4500]">Enlist Now</a>
        {% endif %}
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('mobile-nav-toggle');
        const closeBtn = document.getElementById('close-mobile-nav');
        const overlay = document.getElementById('mobile-menu-overlay');
        
        function toggleNav() {
            overlay.classList.toggle('hidden');
            overlay.classList.toggle('flex');
        }
        if(toggleBtn) toggleBtn.addEventListener('click', toggleNav);
        if(closeBtn) closeBtn.addEventListener('click', toggleNav);
    });
</script>
