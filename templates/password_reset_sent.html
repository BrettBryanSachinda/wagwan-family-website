{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Protocol Sent | Wagwan Family</title>
    <link rel="icon" type="image/png" href="{% static 'images/favlogo.jpeg' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-black text-white h-screen flex items-center justify-center relative overflow-hidden">
    <div class="w-full max-w-md p-8 md:p-10 bg-neutral-950/90 border border-neutral-900 relative z-10 shadow-2xl text-center">
        <h1 class="text-xl font-black uppercase tracking-widest text-white mb-4">Check Your <span class="text-[#FF4500]">Inbox</span></h1>
        <p class="text-sm text-gray-400 font-light leading-relaxed mb-8">
            We've emailed you instructions for setting your password, if an account exists with the email you entered. You should receive them shortly.
        </p>
        <a href="{% url 'login' %}" class="text-xs text-[#FF4500] uppercase tracking-widest font-bold hover:text-white transition">Return to Login</a>
    </div>
</body>
</html>
